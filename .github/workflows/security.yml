name: Security Checks

on:
  push:
    branches:
      - main
      - dev
  pull_request:

jobs:
  static-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install app dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install security tooling
        run: |
          pip install bandit pip-audit

      - name: Run Bandit
        run: |
          bandit -r clients config -ll -iii

      - name: Run pip-audit
        run: |
          pip-audit

  django-security-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: crmdb
          POSTGRES_USER: crmuser
          POSTGRES_PASSWORD: crm_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U crmuser -d crmdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DEBUG: "False"
      SECRET_KEY: "ci-secret-key"
      ALLOWED_HOSTS: "localhost,127.0.0.1"
      CSRF_TRUSTED_ORIGINS: "https://example.com"
      DB_NAME: "crmdb"
      DB_USER: "crmuser"
      DB_PASSWORD: "crm_pass"
      DB_HOST: "127.0.0.1"
      DB_PORT: "5432"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Django deploy checks
        run: |
          python manage.py check --deploy

      - name: Run test suite
        run: |
          python manage.py test clients.test --verbosity=1
