
{% extends "base.html" %}
{% block title %}Map Client{% endblock %}
{% block page_title %}Map Client{% endblock %}
{% block content %}

<h2 class="ki-section-title">Map Client: {{ client.name }}</h2>

<div class="ki-card">
  <form method="post">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label">Select Employee</label>
      <select name="employee" class="form-select">
        <option value="">-- Unmap (None) --</option>
        {% for emp in employees %}
          <option value="{{ emp.id }}" {% if client.mapped_to == emp %}selected{% endif %}>
            {{ emp.user.username }} ({{ emp.role }})
          </option>
        {% endfor %}
      </select>
    </div>
    <div class="d-flex justify-content-between">
      <a href="{% url 'clients:all_clients' %}" class="ki-btn ki-btn-secondary"><i class="bi bi-arrow-left"></i> Cancel</a>
      <button type="submit" class="ki-btn ki-btn-primary"><i class="bi bi-check-lg"></i> Save Mapping</button>
    </div>
  </form>
</div>
{% endblock %}
