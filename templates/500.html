<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Server Error — Kadlag Investment BO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <style>
        body { background: #f1f5f9; font-family: "Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
        .error-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .error-box { text-align:center; background:#fff; border-radius:20px; padding:3rem 2.5rem; box-shadow:0 8px 30px rgba(0,0,0,0.08); max-width:440px; }
        .error-code { font-size:5rem; font-weight:900; background:linear-gradient(135deg,#dc2626,#ef4444); -webkit-background-clip:text; -webkit-text-fill-color:transparent; line-height:1; }
        .error-icon { font-size:3rem; color:#ef4444; margin-bottom:0.5rem; }
        .error-msg { color:#64748b; font-size:1.05rem; margin:0.75rem 0 1.5rem; }
        .btn-back { background:linear-gradient(135deg,#2563eb,#3b82f6); color:#fff; border:none; border-radius:12px; padding:0.7rem 2rem; font-weight:600; text-decoration:none; display:inline-block; transition:transform 0.15s; }
        .btn-back:hover { transform:translateY(-1px); color:#fff; }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-box">
            <div class="error-icon"><i class="bi bi-gear-fill"></i></div>
            <div class="error-code">500</div>
            <p class="error-msg">Something went wrong on our end. Please try again later.</p>
            <a href="/" class="btn-back"><i class="bi bi-house-fill me-1"></i> Go to Dashboard</a>
        </div>
    </div>
</body>
</html>
