{% extends "base.html" %}
{% block title %}Edit Sale{% endblock %}
{% block page_title %}Edit Sale{% endblock %}

{% block content %}
<div class="ki-card" style="max-width:600px;margin:0 auto;">
  <h2 class="ki-section-title text-center"><i class="bi bi-pencil"></i> Edit Sale #{{ sale.id }}</h2>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="ki-btn ki-btn-primary"><i class="bi bi-check-lg"></i> Save Changes</button>
    <a href="{% url 'clients:all_sales' %}" class="ki-btn ki-btn-secondary"><i class="bi bi-x-lg"></i> Cancel</a>
  </form>
</div>
{% endblock %}
