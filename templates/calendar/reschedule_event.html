
{% extends "base.html" %}
{% block title %}Reschedule Event{% endblock %}
{% block page_title %}Reschedule Event{% endblock %}

{% block content %}
<div class="ki-card" style="max-width:480px; margin:0 auto;">
  <h2 class="ki-section-title" style="text-align:center;"><i class="bi bi-calendar-event"></i> Reschedule Event</h2>
  <p><strong>{{ event.title }}</strong></p>
  <p>Currently scheduled: {{ event.scheduled_time|date:"Y-m-d H:i" }}</p>
  <form method="post">
    {% csrf_token %}
    <div class="mb-3">
      <label for="scheduled_time" class="form-label">New Date & Time</label>
      <input type="datetime-local" name="scheduled_time" class="form-control" required>
    </div>
    <div class="d-flex gap-2">
      <button type="submit" class="ki-btn ki-btn-primary"><i class="bi bi-check-lg"></i> Save</button>
      <a href="{% url 'clients:employee_dashboard' %}" class="ki-btn ki-btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
