
{% extends "base.html" %}
{% block title %}Add Follow-up{% endblock %}
{% block page_title %}Add Follow-up{% endblock %}

{% block content %}
<div class="ki-card" style="max-width:480px; margin:0 auto;">
  <h2 class="ki-section-title" style="text-align:center;"><i class="bi bi-clock-history"></i> Add Follow-up for {{ prospect.name }}</h2>
  <form method="post">
    {% csrf_token %}
    <div class="mb-3">
      <label for="followup_date" class="form-label">Follow-up Date & Time</label>
      <input type="datetime-local" class="form-control" id="followup_date" name="followup_date" required>
    </div>
    <div class="mb-3">
      <label for="notes" class="form-label">Notes</label>
      <textarea class="form-control" id="notes" name="notes" rows="3"></textarea>
    </div>
    <div class="d-flex gap-2">
      <button type="submit" class="ki-btn ki-btn-primary"><i class="bi bi-check-lg"></i> Save Follow-up</button>
      <a href="{% url 'clients:callingworkspace' prospect.calling_list.id %}" class="ki-btn ki-btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
