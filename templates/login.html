<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login — KI BackOffice</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <style>
        *{box-sizing:border-box;margin:0;padding:0;}
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 50%, #3b82f6 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: #1e293b;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 2.5rem 2rem;
            position: relative;
            overflow: hidden;
            animation: cardRise 0.5s ease-out;
        }
        @keyframes cardRise {
            from { opacity:0; transform:translateY(30px); }
            to   { opacity:1; transform:translateY(0); }
        }
        .accent-bar {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 5px;
            background: linear-gradient(90deg, #2563eb 0%, #3b82f6 50%, #60a5fa 100%);
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }
        .brand-icon {
            width: 44px; height: 44px;
            border-radius: 12px;
            background: linear-gradient(135deg, #2563eb, #3b82f6);
            display: grid; place-items: center;
            color: #fff;
            font-weight: 800; font-size: 1rem;
            box-shadow: 0 6px 16px rgba(30,64,175,0.35);
        }
        .brand-title { font-weight: 800; font-size: 1.15rem; letter-spacing: 0.02em; color: #1e293b; }
        .brand-sub { color: #64748b; font-size: 0.9rem; }
        .form-label { font-weight: 600; color: #334155; font-size: 0.92rem; }
        .form-control {
            border-radius: 10px; padding: 0.75rem 0.9rem;
            border: 1.5px solid #e2e8f0; transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-control:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
        }
        .btn-login {
            width: 100%;
            border-radius: 12px; border: none;
            background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
            color: #fff; font-weight: 700;
            padding: 0.85rem; font-size: 1rem;
            box-shadow: 0 8px 20px rgba(30,64,175,0.3);
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .btn-login:hover { transform: translateY(-1px); box-shadow: 0 10px 24px rgba(30,64,175,0.4); color:#fff; }
        .btn-login:active { transform: translateY(0); }
        .input-group-text {
            background: #f8fafc; border: 1.5px solid #e2e8f0;
            border-right: none; border-radius: 10px 0 0 10px; color: #64748b;
        }
        .input-group .form-control { border-left: none; border-radius: 0 10px 10px 0; }
        .alert-danger { border-radius: 10px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="accent-bar"></div>
        <div class="brand">
            <div class="brand-icon">KI</div>
            <div>
                <div class="brand-title">KI BackOffice</div>
                <div class="brand-sub">Sign in to your account</div>
            </div>
        </div>

        {% if messages %}
            {% for message in messages %}
                {% if message.level_tag == 'error' %}
                    <div class="alert alert-danger py-2 mb-3">{{ message }}</div>
                {% endif %}
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Username</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
                    <input type="text" name="username" class="form-control" required autocomplete="username" placeholder="Enter username">
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                    <input type="password" name="password" class="form-control" required autocomplete="current-password" placeholder="Enter password">
                </div>
            </div>
            <button type="submit" class="btn btn-login mt-2">
                <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
            </button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
